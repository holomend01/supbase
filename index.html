<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>公益北京地区本人征婚交友平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:12px}
.container{max-width:1200px;margin:0 auto}
.header{text-align:center;color:#fff;padding:15px 0 20px}
.header h1{font-size:1.6rem;margin-bottom:6px;text-shadow:1px 1px 3px rgba(0,0,0,.2)}
.header p{opacity:.9;font-size:.88rem}
.stats-bar{display:flex;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap}
.stat-item{background:rgba(255,255,255,.2);padding:5px 14px;border-radius:15px;font-size:.85rem;color:#fff}
.tabs{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
.tab-btn{padding:10px 18px;border:none;background:rgba(255,255,255,.2);color:#fff;border-radius:20px;cursor:pointer;font-size:.9rem;transition:all .3s;-webkit-tap-highlight-color:transparent}
.tab-btn:hover,.tab-btn.active{background:#fff;color:#667eea}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:15px;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.card-title{font-size:1.1rem;color:#333;margin-bottom:15px;padding-bottom:8px;border-bottom:2px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:.8rem;color:#666;margin-bottom:4px;font-weight:500}
.form-group select,.form-group input,.form-group textarea{padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:.9rem;-webkit-appearance:none;appearance:none;background:#fff}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#667eea}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .3s;-webkit-tap-highlight-color:transparent}
.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:#f5f5f5;color:#333}
.btn-danger{background:#ff4757;color:#fff}
.btn-small{padding:6px 12px;font-size:.82rem}
.profiles-grid{display:grid;grid-template-columns:1fr;gap:15px}
@media(min-width:600px){.profiles-grid{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}}
.profile-card{background:#f8f9fa;border-radius:12px;padding:16px;transition:transform .2s;border-left:4px solid #667eea}
.profile-card.female{border-left-color:#e91e8c}
.profile-card:active{transform:scale(.99)}
.profile-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.profile-num{font-size:1.1rem;font-weight:bold;color:#333}
.profile-code{font-size:.72rem;color:#999;margin-top:2px}
.profile-gender{padding:3px 10px;border-radius:10px;font-size:.82rem;font-weight:500}
.gender-male{background:#e3f2fd;color:#1976d2}
.gender-female{background:#fce4ec;color:#c2185b}
.profile-info{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.info-item{font-size:.83rem}
.info-label{color:#999}
.info-value{color:#333;font-weight:500}
.profile-detail{font-size:.83rem;color:#555;line-height:1.6;margin-bottom:8px;padding:8px 10px;background:#fff;border-radius:6px;word-break:break-all}
.profile-detail-label{color:#667eea;font-weight:600;margin-bottom:3px;font-size:.78rem}
.profile-actions{display:flex;gap:8px;margin-top:10px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:15px;z-index:1000}
.modal-content{background:#fff;border-radius:14px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:20px;position:relative}
.modal-close{position:absolute;top:10px;right:15px;font-size:1.5rem;background:none;border:none;cursor:pointer;color:#999}
.modal-close:hover{color:#333}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.form-grid .full-width{grid-column:span 2}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}.form-grid .full-width{grid-column:span 1}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:.9rem;z-index:2000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.loading{text-align:center;padding:40px;color:#999}
.loading::after{content:'...';animation:loading 1s infinite}
@keyframes loading{0%{opacity:0}50%{opacity:1}100%{opacity:0}}
.empty{text-align:center;padding:40px;color:#999}
.config-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:12px;margin-bottom:15px;text-align:center;font-size:.9rem}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🌸 公益北京地区征婚交友平台</h1>
    <p>真诚交友 · 严肃婚恋 · 完全免费</p>
    <div class="stats-bar">
      <span class="stat-item">总计：<b id="totalCount">-</b>人</span>
      <span class="stat-item">👨 男士：<b id="maleCount">-</b>人</span>
      <span class="stat-item">👩 女士：<b id="femaleCount">-</b>人</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('browse')">📋 浏览资料</button>
    <button class="tab-btn" onclick="switchTab('search')">🔍 筛选查询</button>
    <button class="tab-btn" onclick="switchTab('add')">➕ 信息录入</button>
  </div>

  <!-- 浏览资料 -->
  <div id="browseTab" class="tab-content">
    <div class="card">
      <div class="card-title">全部资料 <span id="browseCount" style="font-size:.85rem;color:#999;font-weight:normal"></span></div>
      <div id="profilesList" class="profiles-grid"></div>
    </div>
  </div>

  <!-- 筛选查询 -->
  <div id="searchTab" class="tab-content hidden">
    <div class="card">
      <div class="card-title">🔒 筛选查询（需口令）</div>
      <div id="passwordGate" style="text-align:center;padding:20px">
        <p style="margin-bottom:15px;color:#666">请输入查询口令</p>
        <input type="password" id="queryPassword" placeholder="输入口令" style="padding:10px 15px;border:1px solid #ddd;border-radius:8px;font-size:1rem;text-align:center" onkeyup="if(event.key==='Enter')verifyPassword()">
        <br><br>
        <button class="btn btn-primary" onclick="verifyPassword()">验证</button>
      </div>
      <div id="searchForm" class="hidden">
        <div class="filter-grid">
          <div class="form-group"><label>性别</label><select id="filterGender"><option value="">不限</option><option value="男">男</option><option value="女">女</option></select></div>
          <div class="form-group"><label>学历</label><select id="filterEducation"><option value="">不限</option><option>初中</option><option>高中</option><option>中专</option><option>大专</option><option>本科</option><option>硕士</option><option>博士</option></select></div>
          <div class="form-group"><label>婚姻状况</label><select id="filterMarriage"><option value="">不限</option><option>未婚</option><option>离异</option><option>丧偶</option></select></div>
          <div class="form-group"><label>最小年龄</label><select id="filterMinAge"><option value="">不限</option></select></div>
          <div class="form-group"><label>最大年龄</label><select id="filterMaxAge"><option value="">不限</option></select></div>
          <div class="form-group"><label>最低身高(cm)</label><select id="filterMinHeight"><option value="">不限</option></select></div>
          <div class="form-group"><label>最高身高(cm)</label><select id="filterMaxHeight"><option value="">不限</option></select></div>
          <div class="form-group"><label>年收入</label><select id="filterIncome"><option value="">不限</option><option>10万以下</option><option>10-15万</option><option>15-20万</option><option>20-30万</option><option>30-50万</option><option>50-100万</option><option>100万以上</option></select></div>
          <div class="form-group"><label>京房情况</label><select id="filterHouse"><option value="">不限</option><option>有</option><option>无</option><option>外地有</option></select></div>
          <div class="form-group"><label>户籍地</label><select id="filterHukou"><option value="">不限</option><option>北京</option><option>外地</option></select></div>
        </div>
        <br>
        <button class="btn btn-primary" style="width:100%" onclick="doSearch()">🔍 开始筛选</button>
        <div id="searchResults" class="profiles-grid" style="margin-top:15px"></div>
      </div>
    </div>
  </div>

  <!-- 信息录入 -->
  <div id="addTab" class="tab-content hidden">
    <div class="card">
      <div class="card-title">📝 个人信息登记</div>
      <form id="addForm" onsubmit="submitProfile(event)">
        <div class="form-grid">
          <div class="form-group"><label>性别 *</label><select id="gender" required><option value="">请选择</option><option>男</option><option>女</option></select></div>
          <div class="form-group"><label>出生年月 *</label><input type="month" id="birthMonth" required></div>
          <div class="form-group"><label>身高(cm) *</label><input type="number" id="height" placeholder="如：170" min="140" max="220" required></div>
          <div class="form-group"><label>体重(kg)</label><input type="number" id="weight" placeholder="如：65" min="40" max="150"></div>
          <div class="form-group"><label>工作地 *</label><input type="text" id="workLocation" placeholder="如：北京" required></div>
          <div class="form-group"><label>户籍地 *</label><input type="text" id="hukou" placeholder="如：北京" required></div>
          <div class="form-group"><label>学历 *</label><select id="education" required><option value="">请选择</option><option>初中</option><option>高中</option><option>中专</option><option>大专</option><option>本科</option><option>硕士</option><option>博士</option></select></div>
          <div class="form-group"><label>婚姻状况 *</label><select id="marriage" required><option value="">请选择</option><option>未婚</option><option>离异</option><option>丧偶</option></select></div>
          <div class="form-group"><label>职业 *</label><input type="text" id="job" placeholder="如：工程师" required></div>
          <div class="form-group"><label>税后年收入 *</label><select id="income" required><option value="">请选择</option><option>10万以下</option><option>10-15万</option><option>15-20万</option><option>20-30万</option><option>30-50万</option><option>50-100万</option><option>100万以上</option></select></div>
          <div class="form-group"><label>京房情况 *</label><select id="house" required><option value="">请选择</option><option>有</option><option>无</option><option>外地有</option></select></div>
          <div class="form-group"><label>健康状况</label><select id="health"><option value="">请选择</option><option>健康</option><option>一般</option><option>较弱</option></select></div>
          <div class="form-group"><label>家中几个孩子</label><select id="children"><option value="">请选择</option><option>独生子</option><option>两个</option><option>三个及以上</option></select></div>
          <div class="form-group"><label>家长目前工作性质</label><select id="parentJob"><option value="">请选择</option><option>退休</option><option>上班</option><option>务农</option><option>自由职业</option></select></div>
          <div class="form-group full-width"><label>性格爱好 / 补充说明</label><textarea id="hobby" rows="3" placeholder="简单介绍一下自己"></textarea></div>
          <div class="form-group full-width"><label>对另一半的期望</label><textarea id="expectation" rows="3" placeholder="简单说一下对另一半的期望"></textarea></div>
        </div>
        <br>
        <button type="submit" class="btn btn-primary" style="width:100%">✅ 提交资料</button>
      </form>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div id="detailModal" class="modal hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div id="editModal" class="modal hidden" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-content">
    <button class="modal-close" onclick="closeEditModal()">×</button>
    <h3 style="margin-bottom:15px">✏️ 编辑资料</h3>
    <form id="editForm" onsubmit="saveEdit(event)">
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div class="form-group"><label>性别</label><select id="editGender" required><option value="">请选择</option><option>男</option><option>女</option></select></div>
        <div class="form-group"><label>出生年月</label><input type="month" id="editBirthMonth" required></div>
        <div class="form-group"><label>身高(cm)</label><input type="number" id="editHeight" required></div>
        <div class="form-group"><label>体重(kg)</label><input type="number" id="editWeight"></div>
        <div class="form-group"><label>工作地</label><input type="text" id="editWorkLocation" required></div>
        <div class="form-group"><label>户籍地</label><input type="text" id="editHukou" required></div>
        <div class="form-group"><label>学历</label><select id="editEducation" required><option value="">请选择</option><option>初中</option><option>高中</option><option>中专</option><option>大专</option><option>本科</option><option>硕士</option><option>博士</option></select></div>
        <div class="form-group"><label>婚姻状况</label><select id="editMarriage" required><option value="">请选择</option><option>未婚</option><option>离异</option><option>丧偶</option></select></div>
        <div class="form-group"><label>职业</label><input type="text" id="editJob" required></div>
        <div class="form-group"><label>税后年收入</label><select id="editIncome" required><option value="">请选择</option><option>10万以下</option><option>10-15万</option><option>15-20万</option><option>20-30万</option><option>30-50万</option><option>50-100万</option><option>100万以上</option></select></div>
        <div class="form-group"><label>京房情况</label><select id="editHouse" required><option value="">请选择</option><option>有</option><option>无</option><option>外地有</option></select></div>
        <div class="form-group"><label>健康状况</label><select id="editHealth"><option value="">请选择</option><option>健康</option><option>一般</option><option>较弱</option></select></div>
        <div class="form-group"><label>家中几个孩子</label><select id="editChildren"><option value="">请选择</option><option>独生子</option><option>两个</option><option>三个及以上</option></select></div>
        <div class="form-group"><label>家长工作</label><select id="editParentJob"><option value="">请选择</option><option>退休</option><option>上班</option><option>务农</option><option>自由职业</option></select></div>
        <div class="form-group full-width"><label>性格爱好</label><textarea id="editHobby" rows="2"></textarea></div>
        <div class="form-group full-width"><label>对另一半的期望</label><textarea id="editExpectation" rows="2"></textarea></div>
      </div>
      <br>
      <button type="submit" class="btn btn-primary" style="width:100%">💾 保存修改</button>
    </form>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div id="deleteModal" class="modal hidden">
  <div class="modal-content" style="text-align:center">
    <h3 style="margin-bottom:15px">⚠️ 确认删除</h3>
    <p style="margin-bottom:20px;color:#666">确定要删除这条资料吗？此操作不可恢复。</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" style="flex:1" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ============================================================
// 🔧 配置区 - Cloudflare Workers API
// ============================================================
const API_BASE = 'https://sit-haap63jpx-jasons-projects-c768faee.vercel.app/api/profiles';
const QUERY_PASSWORD = '.2026.';                  // 筛选查询口令
const ADMIN_PASSWORD = '.2026.';                  // 管理口令（编辑/删除）
// ============================================================

let profiles = [];
let deleteTargetId = null;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadProfiles() {
  try {
    const res = await fetch(API_BASE + '?t=' + Date.now(), {cache:'no-cache'});
    profiles = await res.json();
    updateStats();
    renderProfiles(profiles, 'profilesList', 'browseCount');
  } catch(e) {
    document.getElementById('profilesList').innerHTML = '<div class="empty">加载失败，请检查网络连接</div>';
  }
}

function updateStats() {
  document.getElementById('totalCount').textContent = profiles.length;
  document.getElementById('maleCount').textContent = profiles.filter(p=>p.gender==='男').length;
  document.getElementById('femaleCount').textContent = profiles.filter(p=>p.gender==='女').length;
}

function renderProfiles(data, containerId, countId) {
  const container = document.getElementById(containerId);
  const countEl = document.getElementById(countId);
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty">暂无数据</div>';
    if (countEl) countEl.textContent = '(0)';
    return;
  }
  if (countEl) countEl.textContent = `(${data.length})`;
  container.innerHTML = data.map(p => `
    <div class="profile-card ${p.gender==='女'?'female':''}">
      <div class="profile-header">
        <div>
          <div class="profile-num">${p.code||p.id}</div>
          ${p.code?'<div class="profile-code">#'+p.code+'</div>':''}
        </div>
        <span class="profile-gender ${p.gender==='男'?'gender-male':'gender-female'}">${p.gender}</span>
      </div>
      <div class="profile-info">
        ${p.birth_month?'<div class="info-item"><span class="info-label">年龄</span><span class="info-value">'+getAge(p.birth_month)+'岁</span></div>':''}
        ${p.height?'<div class="info-item"><span class="info-label">身高</span><span class="info-value">'+p.height+'cm</span></div>':''}
        ${p.education?'<div class="info-item"><span class="info-label">学历</span><span class="info-value">'+p.education+'</span></div>':''}
        ${p.marriage?'<div class="info-item"><span class="info-label">婚姻</span><span class="info-value">'+p.marriage+'</span></div>':''}
        ${p.work_location?'<div class="info-item"><span class="info-label">工作地</span><span class="info-value">'+p.work_location+'</span></div>':''}
        ${p.hukou?'<div class="info-item"><span class="info-label">户籍</span><span class="info-value">'+p.hukou+'</span></div>':''}
        ${p.income?'<div class="info-item"><span class="info-label">收入</span><span class="info-value">'+p.income+'</span></div>':''}
        ${p.house?'<div class="info-item"><span class="info-label">京房</span><span class="info-value">'+p.house+'</span></div>':''}
      </div>
      ${p.hobby||p.expectation?'<div class="profile-detail"><div class="profile-detail-label">简介</div>'+(p.hobby||'')+'</div>':''}
      <div class="profile-actions">
        <button class="btn btn-small btn-secondary" onclick="showDetail('${p.id}')">查看详情</button>
      </div>
    </div>
  `).join('');
}

function getAge(birthMonth) {
  if (!birthMonth) return '-';
  const [y,m] = birthMonth.split('-').map(Number);
  const now = new Date();
  let age = now.getFullYear() - y;
  if (now.getMonth()+1 < m) age--;
  return age;
}

function showDetail(id) {
  const p = profiles.find(x => x.id == id);
  if (!p) return;
  document.getElementById('detailContent').innerHTML = `
    <h3 style="margin-bottom:15px">📋 资料详情 ${p.code||'#'+p.id}</h3>
    <div class="profile-info">
      ${p.gender?'<div class="info-item"><span class="info-label">性别</span><span class="info-value">'+p.gender+'</span></div>':''}
      ${p.birth_month?'<div class="info-item"><span class="info-label">年龄</span><span class="info-value">'+getAge(p.birth_month)+'岁</span></div>':''}
      ${p.height?'<div class="info-item"><span class="info-label">身高</span><span class="info-value">'+p.height+'cm</span></div>':''}
      ${p.weight?'<div class="info-item"><span class="info-label">体重</span><span class="info-value">'+p.weight+'kg</span></div>':''}
      ${p.education?'<div class="info-item"><span class="info-label">学历</span><span class="info-value">'+p.education+'</span></div>':''}
      ${p.marriage?'<div class="info-item"><span class="info-label">婚姻状况</span><span class="info-value">'+p.marriage+'</span></div>':''}
      ${p.job?'<div class="info-item"><span class="info-label">职业</span><span class="info-value">'+p.job+'</span></div>':''}
      ${p.income?'<div class="info-item"><span class="info-label">年收入</span><span class="info-value">'+p.income+'</span></div>':''}
      ${p.work_location?'<div class="info-item"><span class="info-label">工作地</span><span class="info-value">'+p.work_location+'</span></div>':''}
      ${p.hukou?'<div class="info-item"><span class="info-label">户籍地</span><span class="info-value">'+p.hukou+'</span></div>':''}
      ${p.house?'<div class="info-item"><span class="info-label">京房情况</span><span class="info-value">'+p.house+'</span></div>':''}
      ${p.health?'<div class="info-item"><span class="info-label">健康状况</span><span class="info-value">'+p.health+'</span></div>':''}
      ${p.children?'<div class="info-item"><span class="info-label">家中孩子</span><span class="info-value">'+p.children+'</span></div>':''}
      ${p.parent_job?'<div class="info-item"><span class="info-label">家长工作</span><span class="info-value">'+p.parent_job+'</span></div>':''}
    </div>
    ${p.hobby?'<div class="profile-detail"><div class="profile-detail-label">性格爱好</div>'+p.hobby+'</div>':''}
    ${p.expectation?'<div class="profile-detail"><div class="profile-detail-label">对另一半的期望</div>'+p.expectation+'</div>':''}
    ${p.fill_time?'<div class="profile-detail"><div class="profile-detail-label">登记时间</div>'+p.fill_time+'</div>':''}
  `;
  document.getElementById('detailModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('detailModal').classList.add('hidden');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  document.getElementById(tab + 'Tab').classList.remove('hidden');
  event.target.classList.add('active');
  if (tab === 'browse' && profiles.length === 0) loadProfiles();
}

function verifyPassword() {
  const pw = document.getElementById('queryPassword').value;
  if (pw === QUERY_PASSWORD) {
    document.getElementById('passwordGate').classList.add('hidden');
    document.getElementById('searchForm').classList.remove('hidden');
    initSearchForm();
  } else {
    toast('⚠️ 口令错误');
  }
}

function initSearchForm() {
  const years = [];
  for (let y = 1970; y <= 2010; y++) years.push(y);
  const html = v => `<option value="${v}">${v || '不限'}</option>`;
  document.getElementById('filterMinAge').innerHTML = html('') + years.map(y => html(y)).join('');
  document.getElementById('filterMaxAge').innerHTML = html('') + years.map(y => html(y)).join('');
  const heights = [];
  for (let h = 150; h <= 200; h++) heights.push(h);
  document.getElementById('filterMinHeight').innerHTML = html('') + heights.map(h => html(h)).join('');
  document.getElementById('filterMaxHeight').innerHTML = html('') + heights.map(h => html(h)).join('');
}

function doSearch() {
  const f = id => document.getElementById(id).value;
  const minAge = f('filterMinAge'), maxAge = f('filterMaxAge');
  const minH = f('filterMinHeight'), maxH = f('filterMaxHeight');
  const filtered = profiles.filter(p => {
    if (f('filterGender') && p.gender !== f('filterGender')) return false;
    if (f('filterEducation') && p.education !== f('filterEducation')) return false;
    if (f('filterMarriage') && p.marriage !== f('filterMarriage')) return false;
    if (f('filterIncome') && p.income !== f('filterIncome')) return false;
    if (f('filterHouse') && p.house !== f('filterHouse')) return false;
    if (f('filterHukou') && (f('filterHukou')==='北京'?!p.hukou?.includes('北京'):p.hukou?.includes('北京'))) return false;
    if (minAge) { const a = getAge(p.birth_month); if (a < minAge) return false; }
    if (maxAge) { const a = getAge(p.birth_month); if (a > maxAge) return false; }
    if (minH && p.height && p.height < minH) return false;
    if (maxH && p.height && p.height > maxH) return false;
    return true;
  });
  renderProfiles(filtered, 'searchResults', null);
  toast('找到 ' + filtered.length + ' 条结果');
}

async function submitProfile(e) {
  e.preventDefault();
  const f = id => document.getElementById(id).value;
  const gender = f('gender');
  if (!gender) { toast('⚠️ 请选择性别'); return; }
  const birthMonth = f('birthMonth');
  if (!birthMonth) { toast('⚠️ 请选择出生年月'); return; }
  
  const maxCode = profiles.length > 0 ? Math.max(...profiles.map(p => parseInt(p.code||p.id||0))) : 0;
  const newProfile = {
    code: String(maxCode + 1).padStart(3, '0'),
    gender, birth_month: birthMonth,
    height: f('height') || null,
    weight: f('weight') || null,
    work_location: f('workLocation'),
    hukou: f('hukou'),
    education: f('education'),
    marriage: f('marriage'),
    job: f('job'),
    income: f('income'),
    house: f('house'),
    health: f('health') || null,
    children: f('children') || null,
    parent_job: f('parentJob') || null,
    hobby: f('hobby') || null,
    expectation: f('expectation') || null,
    fill_time: new Date().toLocaleString('zh-CN')
  };
  
  profiles.push(newProfile);
  try {
    await fetch(API_BASE, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(profiles)
    });
    toast('✅ 提交成功！');
    document.getElementById('addForm').reset();
    updateStats();
  } catch(err) {
    toast('⚠️ 提交失败，请重试');
    profiles.pop();
  }
}

function startEdit(id) {
  const p = profiles.find(x => x.id == id);
  if (!p) return;
  document.getElementById('editId').value = p.id;
  document.getElementById('editGender').value = p.gender || '';
  document.getElementById('editBirthMonth').value = p.birth_month || '';
  document.getElementById('editHeight').value = p.height || '';
  document.getElementById('editWeight').value = p.weight || '';
  document.getElementById('editWorkLocation').value = p.work_location || '';
  document.getElementById('editHukou').value = p.hukou || '';
  document.getElementById('editEducation').value = p.education || '';
  document.getElementById('editMarriage').value = p.marriage || '';
  document.getElementById('editJob').value = p.job || '';
  document.getElementById('editIncome').value = p.income || '';
  document.getElementById('editHouse').value = p.house || '';
  document.getElementById('editHealth').value = p.health || '';
  document.getElementById('editChildren').value = p.children || '';
  document.getElementById('editParentJob').value = p.parent_job || '';
  document.getElementById('editHobby').value = p.hobby || '';
  document.getElementById('editExpectation').value = p.expectation || '';
  document.getElementById('editModal').classList.remove('hidden');
}

function closeEditModal() {
  document.getElementById('editModal').classList.add('hidden');
}

async function saveEdit(e) {
  e.preventDefault();
  const id = document.getElementById('editId').value;
  const idx = profiles.findIndex(p => p.id == id);
  if (idx === -1) return;
  
  const f = id => document.getElementById(id).value;
  profiles[idx] = {
    ...profiles[idx],
    gender: f('editGender'),
    birth_month: f('editBirthMonth'),
    height: f('editHeight') || null,
    weight: f('editWeight') || null,
    work_location: f('editWorkLocation'),
    hukou: f('editHukou'),
    education: f('editEducation'),
    marriage: f('editMarriage'),
    job: f('editJob'),
    income: f('editIncome'),
    house: f('editHouse'),
    health: f('editHealth') || null,
    children: f('editChildren') || null,
    parent_job: f('editParentJob') || null,
    hobby: f('editHobby') || null,
    expectation: f('editExpectation') || null
  };
  
  try {
    await fetch(API_BASE, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(profiles)
    });
    toast('✅ 修改成功！');
    closeEditModal();
    renderProfiles(profiles, 'profilesList', 'browseCount');
    updateStats();
  } catch(err) {
    toast('⚠️ 修改失败，请重试');
  }
}

function startDelete(id) {
  deleteTargetId = id;
  document.getElementById('deleteModal').classList.remove('hidden');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.add('hidden');
  deleteTargetId = null;
}

async function confirmDelete() {
  if (!deleteTargetId) return;
  const idx = profiles.findIndex(p => p.id == deleteTargetId);
  if (idx === -1) return;
  profiles.splice(idx, 1);
  try {
    await fetch(API_BASE, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(profiles)
    });
    toast('✅ 删除成功');
    closeDeleteModal();
    renderProfiles(profiles, 'profilesList', 'browseCount');
    updateStats();
  } catch(err) {
    toast('⚠️ 删除失败，请重试');
  }
}

// 初始化
document.addEventListener('DOMContentLoaded', loadProfiles);
</script>
